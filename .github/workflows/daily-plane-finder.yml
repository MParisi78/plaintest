name: Daily Plane Finder

# Runs the Cessna 172 finder once a day and on manual demand, then posts the
# digest as a GitHub Issue. No secrets to configure — it uses the built-in
# GITHUB_TOKEN. See README.md.

on:
  schedule:
    # 12:00 UTC daily (7 AM US Central / 8 AM Eastern).
    # Format: minute hour day month weekday — always in UTC.
    - cron: "0 12 * * *"
  workflow_dispatch: {}

# Need to write the "seen" state file back and to open issues.
permissions:
  contents: write
  issues: write

# Don't let a slow run overlap with the next scheduled one.
concurrency:
  group: daily-plane-finder
  cancel-in-progress: false

jobs:
  find-planes:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run plane finder
        env:
          # Write the digest as Markdown so the next step can post it as an issue.
          PF_DIGEST_MD: digest.md
        run: python plane_finder.py

      - name: Open digest issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ ! -s digest.md ]]; then
            echo "No digest produced; skipping issue."
            exit 0
          fi
          gh issue create \
            --title "Cessna 172 digest — $(date -u +%Y-%m-%d)" \
            --body-file digest.md \
            --label plane-finder || \
          gh issue create \
            --title "Cessna 172 digest — $(date -u +%Y-%m-%d)" \
            --body-file digest.md

      - name: Persist "seen" state
        # Commit the updated state file so the next run remembers which
        # unicorns we've already alerted on. Skips cleanly if nothing changed.
        run: |
          if [[ -n "$(git status --porcelain plane_finder_seen.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add plane_finder_seen.json
            git commit -m "chore: update plane finder seen state [skip ci]"
            git push
          else
            echo "No state change to commit."
          fi
